spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appointment_db}
    username: ${SPRING_DATASOURCE_USERNAME:appointment_user}
    password: ${SPRING_DATASOURCE_PASSWORD:appointment_pass}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:this-is-a-very-long-secret-key-for-development-only-change-it}
  expiration: ${JWT_EXPIRATION:86400000}